<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I Miei Turni</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- Home View -->
        <div id="home-view" class="view">
            <header class="header">
                <h1>I Miei Turni</h1>
                <button id="settings-btn" class="settings-btn">⚙️</button>
            </header>
            <main class="main">
                <button id="refresh-btn" class="refresh-btn">Aggiorna</button>
                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Caricamento...</p>
                </div>
                <div id="error" class="error hidden">
                    <p>Impossibile caricare i turni. Controlla le credenziali nelle impostazioni.</p>
                    <p id="error-detail" class="error-detail hidden"></p>
                </div>
                <div id="shifts" class="shifts"></div>
            </main>
        </div>

        <!-- Settings View -->
        <div id="settings-view" class="view hidden">
            <header class="header">
                <button id="back-btn" class="back-btn">←</button>
                <h1>Impostazioni</h1>
            </header>
            <main class="main">
                <form id="settings-form" class="settings-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="password-container">
                            <input type="password" id="password" name="password" required>
                            <button type="button" id="toggle-password" class="toggle-password">Mostra</button>
                        </div>
                    </div>
                    <button type="submit" class="save-btn">Salva</button>
                </form>
                <button id="clear-btn" class="clear-btn">Cancella credenziali</button>
                <div class="theme-toggle">
                    <label for="theme-switch">Tema scuro</label>
                    <input type="checkbox" id="theme-switch">
                </div>
            </main>
        </div>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
